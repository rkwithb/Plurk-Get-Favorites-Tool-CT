<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Plurk Archive Browser</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Archive</h1>
        <div class="subtitle">Collected Favorite Plurks</div>
    </header>

    <div class="sticky-header-group">
        <div id="advanced-notice" class="mode-banner" style="display:none;">
            ADVANCED MODE ENABLED (TAG EDITING ACTIVE)
        </div>
        <div class="nav-container">
            <div class="nav-item">
                <label>Month</label>
                <select id="month-select">
                    <option value="">Select Date</option>
                </select>
            </div>
            <div class="nav-item">
                <label>Filter</label>
                <select id="type-filter">
                    <option value="all">All</option>
                    <option value="0">Public</option>
                    <option value="1">Private</option>
                    <option value="4">Anonymous</option>
                </select>
            </div>
            <div class="nav-item">
                <label>Search</label>
                <input type="text" id="search-input" placeholder="Keyword...">
            </div>
            <div class="nav-item">
                <input type="file" id="bg-upload" accept="image/*" style="display:none;">
                <span id="choose-bg-btn" class="bg-btn">Choose BG</span>
                <span id="clear-bg-btn" class="bg-btn clear-btn" style="display:none;">Reset</span>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="display-area" style="display:none;"></div>
        <div id="load-more-container" style="display:none;">
            <button id="load-more-btn" class="btn-load-more">Load More</button>
        </div>
        <div id="initial-msg" class="no-data">PLEASE SELECT A MONTH TO BEGIN</div>
    </div>

    <script src="backup_js/manifest.js"></script>

    <script>
        /* ============================================================
           TAG MANAGER (Advanced Mode Only)
           Handles add/remove tag operations via Flask API.
           ============================================================ */
        class TagManager {
            /**
             * POSTs a new tag to the server and appends a pill to the UI on success.
             * Uses data-tag attribute on the pill anchor for event delegation compatibility.
             */
            static async addTag(inputElement, plurkId) {
                const id = parseInt(plurkId, 10);
                const newTag = inputElement.value.trim();
                if (!newTag) return;

                try {
                    const response = await fetch('/api/tags', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ plurk_id: id, tag_name: newTag })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();

                    if (result.ok) {
                        // Append new pill — uses data-tag for delegated click handler
                        const pillHtml = `<span class="tag-pill">${newTag} <a href="#" data-tag="${newTag}">✖</a></span>`;
                        const tagsContainer = inputElement.closest('.tag-editor').querySelector('.tags-container');
                        tagsContainer.insertAdjacentHTML('beforeend', pillHtml);

                        inputElement.value = '';
                        TagManager._flashInput(inputElement, true);
                    } else {
                        throw new Error(result.error || 'Server rejected the tag');
                    }
                } catch (err) {
                    console.error("Tag addition error:", err);
                    TagManager._flashInput(inputElement, false);
                }
            }

            /**
             * DELETEs a tag from the server and removes the pill from the UI on success.
             */
            static async removeTag(pillElement, plurkId, tagName) {
                const id = parseInt(plurkId, 10);

                try {
                    const response = await fetch('/api/tags', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ plurk_id: id, tag_name: tagName })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();

                    if (result.ok) {
                        pillElement.remove();
                    } else {
                        throw new Error(result.error || 'Server rejected the deletion');
                    }
                } catch (err) {
                    console.error("Tag deletion error:", err);
                }
            }

            /**
             * Flashes the tag input border green (success) or red (failure).
             * Reverts to default after the animation completes.
             */
            static _flashInput(inputElement, success) {
                const color = success ? '#4caf50' : '#e53935';
                inputElement.style.transition = 'border-color 0.1s ease';
                inputElement.style.borderBottomColor = color;
                setTimeout(() => {
                    inputElement.style.borderBottomColor = '';
                }, 800);
            }
        }

        /* ============================================================
           MAIN
           ============================================================ */
        const monthSelect       = document.getElementById('month-select');
        const typeFilter        = document.getElementById('type-filter');
        const searchInput       = document.getElementById('search-input');
        const displayArea       = document.getElementById('display-area');
        const loadMoreBtn       = document.getElementById('load-more-btn');
        const loadMoreContainer = document.getElementById('load-more-container');
        const initialMsg        = document.getElementById('initial-msg');
        const bgUpload          = document.getElementById('bg-upload');
        const chooseBgBtn       = document.getElementById('choose-bg-btn');
        const clearBgBtn        = document.getElementById('clear-bg-btn');
        const advancedNotice    = document.getElementById('advanced-notice');

        let allDataInMonth = [];
        let filteredData   = [];
        let currentPage    = 0;
        const pageSize     = 20;

        // Detect advanced mode by protocol — http(s) means Flask server is running
        const isAdvancedMode = window.location.protocol.startsWith('http');

        // Convert plain URLs in text into clickable anchor tags
        function linkify(text) {
            if (!text) return "";
            const urlPattern = /https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&//=]*)/g;
            return text.replace(urlPattern, url => `<a href="${url}" target="_blank">${url}</a>`);
        }

        // --- Background ---

        function handleBgUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    localStorage.setItem('plurk_bg_base64', e.target.result);
                    applyBg(e.target.result);
                } catch (err) {
                    alert("檔案過大，無法儲存設定！請選擇較小的圖片。");
                }
            };
            reader.readAsDataURL(file);
        }

        function clearBg() {
            localStorage.removeItem('plurk_bg_base64');
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = '#ffffff';
            clearBgBtn.style.display = 'none';
        }

        function applyBg(url) {
            if (!url) return;
            document.body.style.backgroundImage = `url('${url}')`;
            clearBgBtn.style.display = 'inline-block';
        }

        // --- Init ---

        window.onload = function () {
            if (isAdvancedMode) {
                document.body.classList.add('advanced-mode');
                advancedNotice.style.display = 'block';

                // Delegated keydown: Enter on tag input triggers addTag
                displayArea.addEventListener('keydown', function (e) {
                    if (e.target.classList.contains('tag-input') && e.key === 'Enter') {
                        const plurkId = e.target.closest('.plurk-item').dataset.id;
                        TagManager.addTag(e.target, plurkId);
                    }
                });

                // Delegated click: ✖ on any tag pill triggers removeTag
                displayArea.addEventListener('click', function (e) {
                    const deleteBtn = e.target.closest('.tag-pill a');
                    if (!deleteBtn) return;
                    e.preventDefault();
                    const plurkItem = deleteBtn.closest('.plurk-item');
                    TagManager.removeTag(deleteBtn.parentElement, plurkItem.dataset.id, deleteBtn.dataset.tag);
                });
            }

            const savedBg = localStorage.getItem('plurk_bg_base64');
            if (savedBg) applyBg(savedBg);

            if (window.BackupData && window.BackupData.months) {
                window.BackupData.months.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m.replace('_', ' / ');
                    monthSelect.appendChild(opt);
                });
            }

            // Background UI event listeners
            chooseBgBtn.addEventListener('click', () => bgUpload.click());
            bgUpload.addEventListener('change', () => handleBgUpload(bgUpload));
            clearBgBtn.addEventListener('click', clearBg);
        };

        // --- Data & Rendering ---

        function processData() {
            const type    = typeFilter.value;
            const keyword = searchInput.value.toLowerCase().trim();
            filteredData  = allDataInMonth.filter(p => {
                const matchType    = (type === 'all' || p.plurk_type.toString() === type);
                const matchKeyword = (!keyword || p.content_raw.toLowerCase().includes(keyword));
                return matchType && matchKeyword;
            });
            currentPage = 0;
            displayArea.innerHTML = '';
            displayArea.style.display = 'block';
            renderNextPage();
        }

        function renderNextPage() {
            const start     = currentPage * pageSize;
            const end       = start + pageSize;
            const pageItems = filteredData.slice(start, end);

            if (pageItems.length === 0 && currentPage === 0) {
                displayArea.innerHTML = '<div class="no-data">NO POSTS FOUND.</div>';
                loadMoreContainer.style.display = 'none';
                return;
            }

            const html = pageItems.map(p => {
                const typeName = (p.plurk_type === 1) ? "Private" : (p.plurk_type === 4 ? "Anonymous" : "Public");

                // Build tag section based on mode
                let tagSection = '';
                if (isAdvancedMode) {
                    const tagPills = (p.tags && p.tags.length > 0)
                        ? p.tags.map(t => `<span class="tag-pill">${t} <a href="#" data-tag="${t}">✖</a></span>`).join('')
                        : '';
                    tagSection = `
                        <div class="tag-editor">
                            <div class="tags-container">${tagPills}</div>
                            <input type="text" class="tag-input" placeholder="Add tag & hit Enter...">
                        </div>`;
                } else if (p.tags && p.tags.length > 0) {
                    // Basic mode: read-only
                    tagSection = `<div class="tag-display">Tags: ${p.tags.join(', ')}</div>`;
                }

                return `
                    <div class="plurk-item" data-id="${p.plurk_id}">
                        <div class="item-header">
                            <span class="tag tag-${p.plurk_type}">${typeName}</span>
                            <span class="post-date">${p.posted}</span>
                        </div>
                        <div class="content">${linkify(p.content_raw)}</div>
                        ${tagSection}
                        <div class="footer-links">
                            <a href="${p.plurk_url || '#'}" target="_blank">VIEW ON PLURK →</a>
                        </div>
                    </div>`;
            }).join('');

            displayArea.insertAdjacentHTML('beforeend', html);
            currentPage++;
            loadMoreContainer.style.display = (end < filteredData.length) ? 'block' : 'none';
        }

        // --- Event Listeners ---

        monthSelect.addEventListener('change', function () {
            const ym = this.value;
            if (!ym) return;
            initialMsg.style.display = 'none';
            displayArea.innerHTML = '<div class="no-data">LOADING...</div>';
            displayArea.style.display = 'block';

            const script = document.createElement('script');
            script.src = `backup_js/${ym}.js`;
            script.onload = () => {
                allDataInMonth = window.BackupData.plurks[ym];
                processData();
            };
            document.head.appendChild(script);
        });

        typeFilter.addEventListener('change', processData);
        searchInput.addEventListener('input', processData);
        loadMoreBtn.addEventListener('click', renderNextPage);
    </script>
</body>

</html>
