<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Plurk Archive Browser</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Archive</h1>
        <div class="subtitle">Collected Favorite Plurks</div>
    </header>

    <div class="sticky-header-group">
        <div id="advanced-notice" class="mode-banner" style="display:none;">
            ADVANCED MODE ENABLED (TAG EDITING ACTIVE)
        </div>
        <div class="nav-container">
            <div class="nav-item">
                <label>Month</label>
                <select id="month-select">
                    <option value="">Select Date</option>
                </select>
            </div>
            <div class="nav-item">
                <label>Filter</label>
                <select id="type-filter">
                    <option value="all">All</option>
                    <option value="0">Public</option>
                    <option value="1">Private</option>
                    <option value="4">Anonymous</option>
                </select>
            </div>
            <div class="nav-item">
                <label>Search</label>
                <input type="text" id="search-input" placeholder="Keyword...">
            </div>
            <div class="nav-item">
                <input type="file" id="bg-upload" accept="image/*" style="display:none;">
                <span id="choose-bg-btn" class="bg-btn">Choose BG</span>
                <span id="clear-bg-btn" class="bg-btn clear-btn" style="display:none;">Reset</span>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="display-area" style="display:none;"></div>
        <div id="load-more-container" style="display:none;">
            <button id="load-more-btn" class="btn-load-more">Load More</button>
        </div>
        <div id="initial-msg" class="no-data">PLEASE SELECT A MONTH TO BEGIN</div>
    </div>

    <script src="backup_js/manifest.js"></script>

    <script>
        /* ============================================================
           TAG MANAGER (Advanced Mode Only)
           Handles add/remove tag operations via Flask API.
           ============================================================ */
        class TagManager {
            /**
             * POSTs a new tag to the server and appends a pill to the UI on success.
             * Uses data-tag attribute on the pill anchor for event delegation compatibility.
             */
            static async addTag(inputElement, plurkId) {
                const id = parseInt(plurkId, 10);
                const newTag = inputElement.value.trim();
                if (!newTag) return;

                try {
                    const response = await fetch('/api/tags', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ plurk_id: id, tag_name: newTag })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();

                    if (result.ok) {
                        // Append new pill — uses data-tag for delegated click handler
                        const pillHtml = `<span class="tag-pill">${newTag} <a href="#" data-tag="${newTag}">✖</a></span>`;
                        const tagsContainer = inputElement.closest('.tag-editor').querySelector('.tags-container');
                        tagsContainer.insertAdjacentHTML('beforeend', pillHtml);

                        inputElement.value = '';
                        TagManager._flashInput(inputElement, true);
                    } else {
                        throw new Error(result.error || 'Server rejected the tag');
                    }
                } catch (err) {
                    console.error("Tag addition error:", err);
                    TagManager._flashInput(inputElement, false);
                }
            }

            /**
             * DELETEs a tag from the server and removes the pill from the UI on success.
             */
            static async removeTag(pillElement, plurkId, tagName) {
                const id = parseInt(plurkId, 10);

                try {
                    const response = await fetch('/api/tags', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ plurk_id: id, tag_name: tagName })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();

                    if (result.ok) {
                        pillElement.remove();
                    } else {
                        throw new Error(result.error || 'Server rejected the deletion');
                    }
                } catch (err) {
                    console.error("Tag deletion error:", err);
                }
            }

            /**
             * Flashes the tag input border green (success) or red (failure).
             * Reverts to default after the animation completes.
             */
            static _flashInput(inputElement, success) {
                const color = success ? '#4caf50' : '#e53935';
                inputElement.style.transition = 'border-color 0.1s ease';
                inputElement.style.borderBottomColor = color;
                setTimeout(() => {
                    inputElement.style.borderBottomColor = '';
                }, 800);
            }
        }

        /* ============================================================
           MAIN
           ============================================================ */
        const monthSelect = document.getElementById('month-select');
        const typeFilter = document.getElementById('type-filter');
        const searchInput = document.getElementById('search-input');
        const displayArea = document.getElementById('display-area');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadMoreContainer = document.getElementById('load-more-container');
        const initialMsg = document.getElementById('initial-msg');
        const bgUpload = document.getElementById('bg-upload');
        const chooseBgBtn = document.getElementById('choose-bg-btn');
        const clearBgBtn = document.getElementById('clear-bg-btn');
        const advancedNotice = document.getElementById('advanced-notice');

        let allDataInMonth = [];
        let filteredData = [];
        let currentPage = 0;
        const pageSize = 20;
        let apiPlurksCache = {}; // Cache for /api/plurks responses keyed by month

        // Detect advanced mode by protocol — http(s) means Flask server is running
        const isAdvancedMode = window.location.protocol.startsWith('http');

        // Convert plain URLs in text into clickable anchor tags
        function linkify(text) {
            if (!text) return "";
            const urlPattern = /https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&//=]*)/g;
            return text.replace(urlPattern, url => `<a href="${url}" target="_blank">${url}</a>`);
        }

        // --- Background ---

        function handleBgUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    localStorage.setItem('plurk_bg_base64', e.target.result);
                    applyBg(e.target.result);
                } catch (err) {
                    alert("檔案過大，無法儲存設定！請選擇較小的圖片。");
                }
            };
            reader.readAsDataURL(file);
        }

        function clearBg() {
            localStorage.removeItem('plurk_bg_base64');
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = '#ffffff';
            clearBgBtn.style.display = 'none';
        }

        function applyBg(url) {
            if (!url) return;
            document.body.style.backgroundImage = `url('${url}')`;
            clearBgBtn.style.display = 'inline-block';
        }

        // --- Init ---

        window.onload = function () {
            if (isAdvancedMode) {
                document.body.classList.add('advanced-mode');
                advancedNotice.style.display = 'block';

                // Delegated keydown: Enter on tag input triggers addTag
                displayArea.addEventListener('keydown', function (e) {
                    if (e.target.classList.contains('tag-input') && e.key === 'Enter') {
                        const plurkId = e.target.closest('.plurk-item').dataset.id;
                        TagManager.addTag(e.target, plurkId);
                    }
                });

                // Delegated click: ✖ on any tag pill triggers removeTag
                displayArea.addEventListener('click', function (e) {
                    const deleteBtn = e.target.closest('.tag-pill a');
                    if (!deleteBtn) return;
                    e.preventDefault();
                    const plurkItem = deleteBtn.closest('.plurk-item');
                    TagManager.removeTag(deleteBtn.parentElement, plurkItem.dataset.id, deleteBtn.dataset.tag);
                });
            }

            const savedBg = localStorage.getItem('plurk_bg_base64');
            if (savedBg) applyBg(savedBg);

            if (window.BackupData && window.BackupData.months) {
                window.BackupData.months.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m.replace('_', ' / ');
                    monthSelect.appendChild(opt);
                });
            }

            // Background UI event listeners
            chooseBgBtn.addEventListener('click', () => bgUpload.click());
            bgUpload.addEventListener('change', () => handleBgUpload(bgUpload));
            clearBgBtn.addEventListener('click', clearBg);
        };

        // --- Data & Rendering ---

        /**
         * Fetches tags from the database via the /api/tags endpoint.
         * Optionally filters tags by month.
         * Only available in advanced mode (when Flask server is running).
         */
        async function getAllTagsFromMonth(month) {
            if (!isAdvancedMode) return [];

            try {
                let url = '/api/tags';
                if (month) {
                    url += '?month=' + encodeURIComponent(month);
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                return result.tags ? result.tags.map(t => t.name).sort() : [];
            } catch (err) {
                console.error("Failed to fetch tags from database:", err);
                return [];
            }
        }

        /**
         * Fetches tags for a specific plurk from the database.
         * Caches month data to avoid duplicate API calls.
         */
        async function getTagsForPlurk(plurkId) {
            if (!isAdvancedMode) return [];

            try {
                const month = monthSelect.value;

                // Check cache first
                if (!apiPlurksCache[month]) {
                    // Fetch all plurks for this month and cache them
                    const response = await fetch(`/api/plurks?month=${encodeURIComponent(month)}`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();
                    apiPlurksCache[month] = result.plurks || [];
                }

                // Find the specific plurk in cache and return its tags
                const plurks = apiPlurksCache[month];
                const plutkIdInt = parseInt(plurkId, 10);
                const plurk = plurks.find(p => p.plurk_id === plutkIdInt);

                return plurk ? (plurk.tags || []) : [];
            } catch (err) {
                console.error(`Failed to fetch tags for plurk ${plurkId}:`, err);
                return [];
            }
        }

        /**
         * Populates tags for a visible plurk-item from the database.
         */
        async function populatePlurkTags(plurkElement) {
            if (!isAdvancedMode) return;

            const plurkId = plurkElement.dataset.id;
            const tagsContainer = plurkElement.querySelector('.tags-container');

            if (!tagsContainer) return;

            const tags = await getTagsForPlurk(plurkId);

            // Render tag pills
            const tagPills = tags.map(t => `<span class="tag-pill">${t} <a href="#" data-tag="${t}">✖</a></span>`).join('');
            tagsContainer.innerHTML = tagPills;
        }

        /**
         * Populate tags for all visible plurk items (called after rendering new page).
         */
        async function populateAllVisibleTags() {
            if (!isAdvancedMode) return;

            const plurkItems = displayArea.querySelectorAll('.plurk-item');
            const promises = Array.from(plurkItems).map(item => populatePlurkTags(item));
            await Promise.all(promises);
        }

        /**
         * Renders the all-tags display at the top of displayArea.
         * Fetches tags from the database and updates the UI.
         * Preserves the collapsed/expanded state.
         */
        async function renderAllTagsDisplay(month) {
            if (!isAdvancedMode) return;

            const allTags = await getAllTagsFromMonth(month);
            const tagsHtml = allTags.map(tag => `<span class="tag-pill">${tag}</span>`).join('');
            const tagsDisplay = document.getElementById('all-tags-display');
            const headerSpan = document.querySelector('#tags-header span:last-child');

            if (tagsDisplay) {
                tagsDisplay.innerHTML = tagsHtml;
                if (headerSpan) {
                    headerSpan.textContent = `Existing Tags (${allTags.length})`;
                }
            }
        }

        function processData() {
            const type = typeFilter.value;
            const keyword = searchInput.value.toLowerCase().trim();
            filteredData = allDataInMonth.filter(p => {
                const matchType = (type === 'all' || p.plurk_type.toString() === type);
                const matchKeyword = (!keyword || p.content_raw.toLowerCase().includes(keyword));
                return matchType && matchKeyword;
            });
            currentPage = 0;
            displayArea.innerHTML = '';
            displayArea.style.display = 'block';

            // Render all existing tags at the top if in advanced mode
            if (isAdvancedMode) {
                const isCollapsed = localStorage.getItem('tags-section-collapsed') === 'true';
                const tagsSectionHtml = `
                    <div id="all-tags-display-section" class="tags-display-section" style="margin-bottom: 20px;">
                        <div id="tags-header" style="font-weight: bold; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <span id="tags-toggle-icon" style="display: inline-block; transition: transform 0.2s;">▼</span>
                            <span>Existing Tags (loading...)</span>
                        </div>
                        <div id="all-tags-display" style="display: flex; flex-wrap: wrap; gap: 8px; ${isCollapsed ? 'display: none;' : ''}"></div>
                    </div>`;
                displayArea.insertAdjacentHTML('afterbegin', tagsSectionHtml);

                // Add click handler for collapse/expand
                setTimeout(() => {
                    const header = document.getElementById('tags-header');
                    if (header) {
                        header.addEventListener('click', toggleTagsSection);
                    }
                }, 0);

                // Fetch and render tags asynchronously, passing the current month
                renderAllTagsDisplay(monthSelect.value);
            }

            renderNextPage();
        }

        /**
         * Toggle the collapse/expand state of the tags section.
         */
        function toggleTagsSection() {
            const tagsDisplay = document.getElementById('all-tags-display');
            const toggleIcon = document.getElementById('tags-toggle-icon');

            if (tagsDisplay) {
                const isCurrentlyVisible = tagsDisplay.style.display !== 'none';
                tagsDisplay.style.display = isCurrentlyVisible ? 'none' : 'flex';

                // Rotate the arrow icon
                if (toggleIcon) {
                    toggleIcon.style.transform = isCurrentlyVisible ? 'rotate(-90deg)' : 'rotate(0deg)';
                }

                // Save preference to localStorage
                localStorage.setItem('tags-section-collapsed', !isCurrentlyVisible);
            }
        }

        function renderNextPage() {
            const start = currentPage * pageSize;
            const end = start + pageSize;
            const pageItems = filteredData.slice(start, end);

            if (pageItems.length === 0 && currentPage === 0) {
                displayArea.innerHTML = '<div class="no-data">NO POSTS FOUND.</div>';
                loadMoreContainer.style.display = 'none';
                return;
            }

            const html = pageItems.map(p => {
                const typeName = (p.plurk_type === 1) ? "Private" : (p.plurk_type === 4 ? "Anonymous" : "Public");

                // Build tag section based on mode
                let tagSection = '';
                if (isAdvancedMode) {
                    // In advanced mode, create empty tag container that will be populated from DB
                    tagSection = `
                        <div class="tag-editor">
                            <div class="tags-container"></div>
                            <input type="text" class="tag-input" placeholder="Add tag & hit Enter...">
                        </div>`;
                } else if (p.tags && p.tags.length > 0) {
                    // Basic mode: read-only tags from backup_js
                    tagSection = `<div class="tag-display">Tags: ${p.tags.join(', ')}</div>`;
                }

                return `
                    <div class="plurk-item" data-id="${p.plurk_id}">
                        <div class="item-header">
                            <span class="tag tag-${p.plurk_type}">${typeName}</span>
                            <span class="post-date">${p.posted}</span>
                        </div>
                        <div class="content">${linkify(p.content_raw)}</div>
                        ${tagSection}
                        <div class="footer-links">
                            <a href="${p.plurk_url || '#'}" target="_blank">VIEW ON PLURK →</a>
                        </div>
                    </div>`;
            }).join('');

            displayArea.insertAdjacentHTML('beforeend', html);
            currentPage++;
            loadMoreContainer.style.display = (end < filteredData.length) ? 'block' : 'none';

            // Populate tags from database for all newly rendered plurks
            populateAllVisibleTags();
        }

        // --- Event Listeners ---

        monthSelect.addEventListener('change', function () {
            const ym = this.value;
            if (!ym) return;

            // Clear API cache when switching months
            apiPlurksCache = {};

            initialMsg.style.display = 'none';
            displayArea.innerHTML = '<div class="no-data">LOADING...</div>';
            displayArea.style.display = 'block';

            const script = document.createElement('script');
            script.src = `backup_js/${ym}.js`;
            script.onload = () => {
                allDataInMonth = window.BackupData.plurks[ym];
                processData();
            };
            document.head.appendChild(script);
        });

        typeFilter.addEventListener('change', processData);
        searchInput.addEventListener('input', processData);
        loadMoreBtn.addEventListener('click', renderNextPage);
    </script>
</body>

</html>
